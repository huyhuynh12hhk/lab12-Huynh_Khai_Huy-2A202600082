events { worker_connections 256; }

http {
    # Docker's embedded DNS resolver — resolves service names dynamically.
    # Required so nginx picks up new agent containers added by --scale.
    resolver 127.0.0.11 valid=10s;

    upstream agent_cluster {
        # Docker Compose registers all "agent" containers under this hostname.
        # Nginx distributes requests in round-robin by default.
        server agent:8000;
        keepalive 16;
    }

    server {
        listen 80;

        # Expose which backend instance handled each request — useful for
        # verifying that load balancing is actually working.
        add_header X-Served-By $upstream_addr always;

        # Increase timeouts slightly for LLM responses which may be slow.
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        location / {
            proxy_pass         http://agent_cluster;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            # Try the next upstream on failure/timeout (fault tolerance).
            proxy_next_upstream       error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        # Health and readiness endpoints — suppress access logs to reduce noise.
        location ~ ^/(health|ready)$ {
            proxy_pass http://agent_cluster;
            access_log off;
        }
    }
}
